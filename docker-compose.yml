services:
  app:
    build: .
    container_name: stockup_app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: stockup_db
    restart: always
    environment:
      MYSQL_DATABASE: stockup
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - stockup_data:/var/lib/mysql
      - ./database/stockup.sql:/docker-entrypoint-initdb.d/stockup.sql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: stockup_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db

volumes:
  stockup_data: