<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock’Up Inscription</title>
  <link rel="stylesheet" href="/stockup/front/css/style.css" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <header class="auth-top">
      <div class="logo-box">
        <img src="/stockup/front/images/logo-stockup.png" alt="Logo Stock'Up" />
      </div>
    </header>

    <p class="auth-subtitle">Créez votre espace personnel</p>

    <section class="auth-card">
      <h2>Inscription</h2>

      <form id="register-form" class="form">
        <div class="form-row">
          <div class="form-group">
            <label for="nom">Nom</label>
            <input type="text" id="nom" placeholder="Dupont" required />
            <small id="nom-hint" class="form-hint">Champ requis</small>
          </div>

          <div class="form-group">
            <label for="prenom">Prénom</label>
            <input type="text" id="prenom" placeholder="Jean" required />
            <small id="prenom-hint"  class="form-hint">Champ requis</small>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="exemple@email.com" required />
          <small id="email-hint" class="form-hint">Format attendu : exemple@email.com</small>
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" placeholder="************" required />
          <small id="password-hint" class="form-hint">
            Minimum 8 caractères, avec 1 majuscule, 1 minuscule, 1 chiffre et 1 caractère spécial
          </small>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirmer le mot de passe</label>
          <input 
            type="password" 
            id="confirm-password" 
            placeholder="************" 
            required 
          />
          <small id="confirm-password-hint" class="form-hint">
            Doit être identique au mot de passe
          </small>
        </div>

        <button type="submit" class="btn btn-primary">S’inscrire</button>
      </form>

      <p class="auth-link">
        Déjà un compte ?
        <a href="/stockup/front/login.html">Se connecter</a>
      </p>

      <p id="register-message" class="message"></p>
    </section>

    <footer class="support-footer">
      <a class="support-btn" href="#">Support Technique</a>
    </footer>
  </main>

  <script src="/stockup/front/js/auth.js"></script>
</body>
