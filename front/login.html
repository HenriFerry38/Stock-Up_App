<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock’Up Connexion</title>
  <link rel="stylesheet" href="/stockup/front/css/style.css" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <header class="auth-top">
      <div class="logo-box">
        <img src="/stockup/front/images/logo-stockup.png" alt="Logo Stock'Up" />
      </div>
    </header>

    <p class="auth-subtitle">Gérez votre stock et vos courses de manière maline</p>

    <section class="auth-card">
      <h2>Connexion</h2>

      <form id="login-form" class="form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="exemple@email.com" required />
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" placeholder="************" required />
        </div>

        <button type="submit" class="btn btn-primary">Se Connecter</button>
      </form>

      <p class="auth-link">
        Pas encore de compte ?<br />
        <a href="/stockup/front/register.html">S'inscrire</a>
      </p>

      <p id="login-message" class="message"></p>
    </section>

    <footer class="support-footer">
      <a class="support-btn" href="#">Support Technique</a>
    </footer>
  </main>

  <script src="/stockup/front/js/auth.js"></script>
</body>
