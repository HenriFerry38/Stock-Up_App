<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock’Up</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="app-layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-box">
        <img src="images/Logo_StockUp.png" alt="Logo Stock’Up">
      </div>
    </div>

    <nav>
      <a href="#" class="nav-link active">Tableau de bord</a>
      <a href="#" class="nav-link">Mon Stock</a>
      <a href="#" class="nav-link">Liste de courses</a>
    </nav>
  </aside>

  <div class="main-panel">
    <header class="header">
      <div>
        <h1>Bonjour <span id="user-prenom">Utilisateur</span> !</h1>
        <p>Gérez votre stock et vos courses facilement</p>
      </div>

      <div class="user-box">
        <strong id="user-fullname">Utilisateur</strong><br>
        <button id="logout-btn" class="logout-link">Déconnexion</button>
      </div>
    </header>

    <main class="dashboard">

      <section class="card add-product-card">
        <h2>Ajouter un produit</h2>

        <form id="product-form" class="product-form">
          <div class="form-group">
            <label for="nom">Nom du produit</label>
            <input type="text" id="nom" placeholder="ex: Pâtes" required />
          </div>

          <div class="form-group">
            <label for="categorie">Catégorie</label>
            <input type="text" id="categorie" placeholder="ex: Féculents" required />
          </div>

          <div class="form-group">
            <label for="quantite">Quantité</label>
            <input type="number" id="quantite" placeholder="ex: 2" required />
          </div>

          <div class="form-group">
            <label for="seuil">Seuil minimum</label>
            <input type="number" id="seuil" placeholder="ex: 2" required />
          </div>

          <button type="submit" class="btn btn-primary">Ajouter +</button>
        </form>
      </section>

      <section class="card stock-card">
        <div class="card-title-row">
          <h2>Mon stock</h2>
          <button class="btn btn-small btn-primary">Voir tout le stock</button>
        </div>

        <div class="toolbar">
          <input type="text" id="search-product" placeholder="Rechercher un produit..." />
          <select id="category-filter">
            <option value="">Toutes les catégories</option>
          </select>
        </div>

        <div id="product-list"></div>
      </section>

      <section class="card shopping-card">
        <h2>Ma Liste de courses</h2>
        <button id="generate-btn" class="btn btn-primary generate-btn">Générer la liste</button>
        <div id="shopping-list"></div>
      </section>

    </main>

    <footer class="app-footer">
      <a href="#" class="support-btn">Support Technique</a>
    </footer>
  </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
